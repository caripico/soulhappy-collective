<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Soulhappy Collective</title>
  <meta name="description" content="Get in touch with Soulhappy Collective." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;500;700&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <nav class="nav-inner">

      <a href="index.html" class="logo">
        <img src="assets/logo.png" alt="Soulhappy Collective logo" onerror="this.style.display='none'" />
        <span class="logo-text">Soulhappy Collective</span>
      </a>

      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>

      <div class="nav-icons">
        <a href="index.html" aria-label="Account">
          <svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </a>
        <a href="index.html" aria-label="Cart">
          <svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        </a>
        <button class="hamburger" aria-label="Menu" onclick="toggleMobileNav()">
          <span></span><span></span><span></span>
        </button>
      </div>

    </nav>
    <div class="mobile-nav" id="mobile-nav">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
  </header>

  <!-- CONTACT FORM -->
  <main>
    <section class="contact-section">
      <h1>Contact</h1>
      <p class="subtitle">Have a question or a custom request? We'd love to hear from you.</p>

      <form class="contact-form" onsubmit="handleContact(event)">

        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required />
        </div>

        <div class="form-group">
          <label for="subject">Subject</label>
          <input type="text" id="subject" name="subject" placeholder="What's it about?" />
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Tell us how we can help…" required></textarea>
        </div>

        <div>
          <button type="submit" class="btn-primary">Send Message</button>
        </div>

      </form>
    </section>
  </main>

  <hr class="divider" />

  <footer class="site-footer">
    <div class="footer-bottom" style="border-top:none; padding-top:0;">
      <span>© 2025, Soulhappy Collective</span>
      <span>·</span>
      <a href="#">Privacy policy</a>
      <span>·</span>
      <a href="#">Cookie preferences</a>
    </div>
  </footer>

  <div class="toast" id="toast"></div>
  <script src="main.js"></script>
</body>
</html>
